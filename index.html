<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KPOP Wordle</title>
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #0f0f11, #1a1a1f);
        color: white;
        text-align: center;
        margin: 0;
        padding: 15px;
        min-height: 100vh;
        box-sizing: border-box;
    }
    h1 {
        margin: 15px 0 10px;
        font-size: 2.2em;
        text-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
    }
    #dbBtn, #rulesBtn {
        position: fixed; 
        right: 15px;
        padding: 10px 16px;
        border: none; 
        border-radius: 8px; 
        cursor: pointer;
        font-size: 15px;
        z-index: 100;
    }
    #dbBtn { top: 15px; background: #333; color: white; }
    #rulesBtn { top: 65px; background: #4a90e2; color: white; }

    .input-area {
        margin: 15px auto;
        max-width: 420px;
        width: 100%;
        position: relative;
    }
    input {
        padding: 16px 20px;
        font-size: 18px;
        border-radius: 12px;
        border: none;
        width: 100%;
        background: #25252b;
        color: white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    input:disabled {
        background: #1a1a1f;
        color: #777;
        cursor: not-allowed;
    }
    input:focus { box-shadow: 0 0 0 3px rgba(255, 20, 147, 0.4); }

    #suggestions {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        top: 100%;
        max-height: 260px;
        overflow-y: auto;
        margin: 4px 0 0 0;
        text-align: left;
        width: 100%;
        max-width: 420px;
        background: #1f1f25;
        border-radius: 12px;
        border: 1px solid #444;
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        z-index: 10;
    }
    #suggestions div { 
        padding: 14px 18px; 
        cursor: pointer; 
        border-bottom: 1px solid #333; 
    }
    #suggestions div:hover { background: #333; }

    button {
        padding: 12px 20px; 
        margin: 8px 4px; 
        font-size: 16px;
        border-radius: 10px; 
        border: none; 
        cursor: pointer;
        background: #333; 
        color: white;
    }
    button:hover { background: #555; transform: translateY(-2px); }

    #gameSetup {
        margin: 15px auto;
        max-width: 580px;
        background: #1f1f25;
        padding: 20px;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
    }

    #timeLimit {
        padding: 12px 16px;
        font-size: 18px;
        background: #25252b;
        color: white;
        border: none;
        border-radius: 10px;
    }

    #timer {
        font-size: 22px;
        font-weight: bold;
        color: #ffeb3b;
        margin: 10px 0 15px 0;
    }

    .table-container {
        overflow-x: auto;
        margin: 10px auto 40px auto;
        max-width: 100%;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }
    table {
        border-collapse: collapse;
        background: #1a1a1f;
        width: 100%;
        min-width: 950px; /* 讓手機可橫向捲動 */
        table-layout: fixed;
        font-size: 16px;
    }
    th, td {
        padding: 12px 8px;
        border: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    th {
        background: #25252b;
        font-size: 15px;
        border-bottom: 2px solid #444;
    }
    .count-col { 
        width: 55px; 
        text-align: center; 
        font-weight: bold; 
    }
    .correct { background: #6aaa64 !important; color: white; }
    .close { background: #c9b458 !important; color: black; }
    .wrong { background: #3a3a3c !important; }
    .timeout { background: #555 !important; color: #aaa; }

    #result {
        min-height: 60px;
        margin: 15px 0 20px 0;
        font-size: 18px;
    }

    .footer {
        margin-top: 60px;
        padding: 40px 20px 30px;
        border-top: 2px solid #444;
        background: rgba(31, 31, 37, 0.8);
        border-radius: 16px;
    }

    /* 手機優化 */
    @media (max-width: 600px) {
        h1 { font-size: 1.95em; }
        button { font-size: 15px; padding: 11px 18px; }
        input { font-size: 17px; padding: 15px 16px; }
        table { font-size: 15px; }
        th, td { padding: 11px 6px; }
        #gameSetup { padding: 16px; gap: 16px; }
        .count-col { width: 48px; }
    }
</style>
</head>
<body>
    <h1>🎤 KPOP Wordle</h1>
    <button id="dbBtn" onclick="showDatabase()">📋 題庫</button>
    <button id="rulesBtn" onclick="showRules()">📜 遊戲規則</button>

    <div id="gameSetup">
        <h3>遊戲設定</h3>
        <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
            <div>
                難度：
                <button onclick="selectDifficulty(8)">簡單 (8次)</button>
                <button onclick="selectDifficulty(6)">中等 (6次)</button>
                <button onclick="selectDifficulty(4)">困難 (4次)</button>
            </div>
        </div>
        
        <div style="display:flex; gap:15px; align-items:center; flex-wrap:wrap; justify-content:center;">
            <label style="font-size:17px;">每次作答時間：
                <select id="timeLimit">
                    <option value="0">不計時</option>
                    <option value="30">30 秒</option>
                    <option value="60" selected>60 秒</option>
                    <option value="90">90 秒</option>
                    <option value="120">120 秒</option>
                </select>
            </label>
        </div>
        
        <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
            <button onclick="startGameWithSettings()" style="background:#e91e63; font-size:16px; padding:12px 28px;">
                ▶️ 開始遊戲
            </button>
            <button onclick="confirmNewGame()" style="background:#333; font-size:16px; padding:12px 24px;">
                🔄 新遊戲
            </button>
        </div>
    </div>

    <div id="timer">本次回答剩餘時間：不計時</div>
    
    <div class="input-area">
        <input id="guessInput" placeholder="輸入偶像名字（請先按開始遊戲）" 
               autocomplete="off" oninput="showSuggestions()" disabled>
        <div id="suggestions"></div>
    </div>
  
    <h2 id="result"></h2>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="count-col">次數</th>
                    <th>名字</th><th>團體</th><th>國籍</th><th>出生年</th><th>出道年</th><th>成員數</th>
                </tr>
            </thead>
            <tbody id="gameBody"></tbody>
        </table>
    </div>

    <!-- 題庫彈窗 -->
    <div id="databaseModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:200;">
        <div style="background:#1f1f21;width:90%;max-width:1200px;max-height:90vh;overflow:auto;border-radius:16px;padding:25px;position:relative;">
            <button onclick="closeDatabase()" style="position:absolute;top:15px;right:15px;background:#c44;padding:8px 16px;">✕</button>
            <h2>📋 完整題庫</h2>
            <div style="margin:20px 0; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
                <select id="mainFilter" onchange="updateSearchOptions()" style="padding:12px 16px;font-size:16px;">
                    <option value="all">全部</option>
                    <option value="group">團體</option>
                    <option value="nationality">國籍</option>
                    <option value="birth">出生年</option>
                    <option value="debut">出道年</option>
                    <option value="members">成員數</option>
                </select>
                <input list="searchList" id="searchInput" placeholder="輸入關鍵字" style="padding:12px 16px;font-size:16px;width:280px;">
                <button onclick="renderDatabase()" style="padding:12px 24px;">篩選</button>
            </div>
            <table style="width:100%;">
                <thead>
                    <tr><th>名字</th><th>團體</th><th>國籍</th><th>出生年</th><th>出道年</th><th>成員數</th></tr>
                </thead>
                <tbody id="dbBody"></tbody>
            </table>
        </div>
    </div>
    <datalist id="searchList"></datalist>

    <div class="footer">
        <div class="social-area">
            <p style="margin-bottom: 25px; font-size: 19px; color: #ddd;">
                如果喜歡這遊戲，歡迎訂閱追隨支持！
            </p>
            <a href="https://www.youtube.com/@kpopcast" target="_blank" style="margin: 0 25px; font-size: 22px; text-decoration: none; color: #ff4081;">YouTube</a>
            <a href="https://www.threads.com/@shr1mp_527" target="_blank" style="margin: 0 25px; font-size: 22px; text-decoration: none; color: #ff4081;">Threads</a>
        </div>
    </div>

let answer = {}, gameOver = false, guessCount = 0, currentMax = 6;
let guessedSet = new Set();
let timerInterval = null;
let timeLeft = 0;
let gameStarted = false;   // 新增：控制是否已開始遊戲

const guessInput = document.getElementById('guessInput');
const suggestions = document.getElementById('suggestions');
const gameBody = document.getElementById('gameBody');
const result = document.getElementById('result');
const timerDisplay = document.getElementById('timer');

// 國籍比對
function getNationalityClass(guessed, correct) {
    if (guessed === correct) return 'correct';
    const g = guessed.split('/').map(s => s.trim());
    const c = correct.split('/').map(s => s.trim());
    return g.some(gg => c.includes(gg)) || c.some(cc => g.includes(cc)) ? 'close' : 'wrong';
}

// ================== 遊戲設定 ==================
function selectDifficulty(max) {
    currentMax = max;
    initTableRows();
}

function initTableRows() {
    gameBody.innerHTML = "";
    for (let i = 1; i <= currentMax; i++) {
        let row = gameBody.insertRow();
        let cell = row.insertCell();
        cell.textContent = i;
        cell.classList.add('count-col');
        for (let j = 0; j < 6; j++) {
            row.insertCell();
        }
    }
}

function startGameWithSettings() {
    if (!gameOver && guessCount > 0 && !confirm("確定要放棄目前遊戲，開始新的一局嗎？")) return;
    const timeSelect = parseInt(document.getElementById('timeLimit').value);
    startNewGame(currentMax, timeSelect);
}

function confirmNewGame() {
    if (!gameOver && guessCount > 0 && !confirm("確定要放棄目前遊戲，開始新的一局嗎？")) return;
    const timeSelect = parseInt(document.getElementById('timeLimit').value);
    startNewGame(currentMax, timeSelect);
}

function startNewGame(max, timeLimit) {
    currentMax = max;
    answer = idols[Math.floor(Math.random() * idols.length)];
    gameOver = false;
    guessCount = 0;
    guessedSet.clear();
    gameStarted = true;
    result.innerHTML = "";
    guessInput.value = "";
    suggestions.innerHTML = "";
    guessInput.disabled = false;   // 啟用輸入

    updateTimerDisplay(timeLimit);
    if (timerInterval) clearInterval(timerInterval);
    timeLeft = timeLimit;
    initTableRows();
    if (timeLimit > 0) startTimer(timeLimit);
}

function updateTimerDisplay(seconds) {
    timerDisplay.textContent = seconds > 0
        ? `本次回答剩餘時間：${seconds} 秒`
        : `本次回答剩餘時間：不計時`;
}

function startTimer(seconds) {
    timeLeft = seconds;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `本次回答剩餘時間：${timeLeft} 秒`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (!gameOver) skipCurrentGuess();
        }
    }, 1000);
}

function skipCurrentGuess() {
    if (guessCount >= currentMax) return;
    guessCount++;
    markRowAsTimeout(guessCount);
    if (guessCount >= currentMax) {
        result.innerHTML = `😢 遊戲結束！正確答案是 <b>${answer.name} (${answer.group})</b>`;
        gameOver = true;
        timerDisplay.textContent = `本次回答剩餘時間：結束`;
        return;
    }
    const timeSelect = parseInt(document.getElementById('timeLimit').value);
    if (timeSelect > 0) startTimer(timeSelect);
}

function markRowAsTimeout(rowNum) {
    const rows = gameBody.rows;
    if (rowNum > 0 && rowNum <= rows.length) {
        const row = rows[rowNum - 1];
        row.cells[1].textContent = "已超時";
        row.cells[1].colSpan = 6;
        row.cells[1].classList.add('timeout');
        for (let i = row.cells.length - 1; i >= 2; i--) {
            row.deleteCell(i);
        }
    }
}

// ================== 猜測功能 ==================
function showSuggestions() {
    let input = guessInput.value.toLowerCase().trim();
    suggestions.innerHTML = "";
    if (!input || gameOver || !gameStarted) return;
    
    let filtered = idols.filter(i =>
        !guessedSet.has(i.name + i.group) &&
        (i.name.toLowerCase().includes(input) || i.group.toLowerCase().includes(input))
    ).slice(0, 8);

    filtered.forEach(i => {
        let d = document.createElement("div");
        d.textContent = `${i.name} (${i.group})`;
        d.onclick = () => {
            guessInput.value = `${i.name} (${i.group})`;
            guess();
        };
        suggestions.appendChild(d);
    });
}

function guess() {
    if (!gameStarted) {
        alert("請先按「開始遊戲」！");
        return;
    }
    if (gameOver || guessCount >= currentMax) return;
    
    const input = guessInput.value.trim();
    if (!input) return;

    const idol = idols.find(i => `${i.name} (${i.group})`.toLowerCase() === input.toLowerCase());
    if (!idol) {
        alert("找不到這個偶像！");
        return;
    }
   
    let key = idol.name + idol.group;
    if (guessedSet.has(key)) return;
   
    guessedSet.add(key);
    guessCount++;
   
    if (timerInterval) clearInterval(timerInterval);
   
    fillRow(guessCount, idol);
   
    if (idol.name === answer.name && idol.group === answer.group) {
        result.innerHTML = `🎉 恭喜猜對！答案是 <b>${answer.name} (${answer.group})</b>`;
        gameOver = true;
        timerDisplay.textContent = `本次回答剩餘時間：完成！`;
        return;
    }
   
    if (guessCount >= currentMax) {
        result.innerHTML = `😢 遊戲結束！正確答案是 <b>${answer.name} (${answer.group})</b>`;
        gameOver = true;
        timerDisplay.textContent = `本次回答剩餘時間：結束`;
        return;
    }
   
    guessInput.value = "";
    suggestions.innerHTML = "";
   
    const timeSelect = parseInt(document.getElementById('timeLimit').value);
    if (timeSelect > 0) startTimer(timeSelect);
}

function fillRow(rowNum, idol) {
    const rows = gameBody.rows;
    if (rowNum > 0 && rowNum <= rows.length) {
        const row = rows[rowNum - 1];
        
        row.cells[1].textContent = idol.name;
        row.cells[1].classList.add(idol.name === answer.name ? 'correct' : 'wrong');
       
        row.cells[2].textContent = idol.group;
        row.cells[2].classList.add(idol.group === answer.group ? 'correct' : 'wrong');
       
        row.cells[3].textContent = idol.nationality;
        row.cells[3].classList.add(getNationalityClass(idol.nationality, answer.nationality));
       
        row.cells[4].textContent = idol.birth;
        if (idol.birth === answer.birth) row.cells[4].classList.add('correct');
        else if (Math.abs(idol.birth - answer.birth) <= 1) row.cells[4].classList.add('close');
        else row.cells[4].classList.add('wrong');
       
        row.cells[5].textContent = idol.debut;
        if (idol.debut === answer.debut) row.cells[5].classList.add('correct');
        else if (Math.abs(idol.debut - answer.debut) <= 1) row.cells[5].classList.add('close');
        else row.cells[5].classList.add('wrong');
       
        row.cells[6].textContent = idol.members;
        if (idol.members === answer.members) row.cells[6].classList.add('correct');
        else if (Math.abs(idol.members - answer.members) <= 1) row.cells[6].classList.add('close');
        else row.cells[6].classList.add('wrong');
    }
}

// ================== 題庫 ==================
function showDatabase() {
    document.getElementById('databaseModal').style.display = "flex";
    updateSearchOptions();
    renderDatabase();
}

function closeDatabase() {
    document.getElementById('databaseModal').style.display = "none";
}

function updateSearchOptions() {
    const type = document.getElementById('mainFilter').value;
    const datalist = document.getElementById('searchList');
    datalist.innerHTML = "";
    if (type === "all") return;
    
    let values = [...new Set(idols.map(i => i[type]))];
    if (type === "members" || type === "birth" || type === "debut") {
        values.sort((a, b) => Number(a) - Number(b));
    } else {
        values.sort((a, b) => String(a).localeCompare(String(b)));
    }
    
    values.forEach(v => {
        let opt = document.createElement("option");
        opt.value = v;
        datalist.appendChild(opt);
    });
}

function renderDatabase() {
    const tbody = document.getElementById('dbBody');
    tbody.innerHTML = "";
    const type = document.getElementById('mainFilter').value;
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    
    let filtered = idols;
    if (type !== "all" && keyword) {
        filtered = idols.filter(i => String(i[type]).toLowerCase().includes(keyword));
    }
    
    filtered.forEach(i => {
        let r = tbody.insertRow();
        r.insertCell().textContent = i.name;
        r.insertCell().textContent = i.group;
        r.insertCell().textContent = i.nationality;
        r.insertCell().textContent = i.birth;
        r.insertCell().textContent = i.debut;
        r.insertCell().textContent = i.members;
    });
}

function showRules() {
    alert(`🎤 KPOP Wordle 遊戲規則
1. 先選擇難度與每題作答時間，再按「開始遊戲」
2. 時間到會自動標記「已超時」，並跳過該次機會
3. 綠色=正確，黃色=接近，灰色=錯誤
   接近的判定範圍
   (1)國籍：其中一個正確就算接近
   (2)出生年、出道年、成員數：正負1之內算接近
4. 題庫皆為現役藝人，遊玩前可先查看題庫

祝你玩得愉快！`);
}

// Enter 送出
guessInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') guess();
});

window.onload = () => {
    initTableRows();
    guessInput.disabled = true;   // 預設禁用輸入框
};
