#suggestions {

#remaining { font-size:18px; margin:10px; color:#bbb; }
button { padding:10px 16px; margin:5px; font-size:16px; border-radius:8px; border:none; cursor:pointer; }

#dbBtn {
    position: fixed; top: 15px; right: 15px;
    background: #444; color: white; padding: 8px 14px;
    font-size: 14px; border-radius: 6px;
}

#databaseModal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
}
#modalContent {
    background: #1f1f21; width: 90%; max-width: 900px; max-height: 85vh;
    overflow-y: auto; border-radius: 12px; padding: 20px;
}
</style>
</head>

// ===== 遊戲邏輯（完全保留）=====
let answer = {}, gameOver = false, guessCount = 0, currentMax = 10;

function startNewGame(maxGuesses) {
    currentMax = maxGuesses;
    answer = idols[Math.floor(Math.random() * idols.length)];
    gameOver = false;
    guessCount = 0;

    document.getElementById("gameBody").innerHTML = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("guessInput").value = "";
    document.getElementById("suggestions").innerHTML = "";
    updateRemaining();
}

function showSuggestions() {
    const input = document.getElementById("guessInput").value.toLowerCase().trim();
    const sugBox = document.getElementById("suggestions");
    sugBox.innerHTML = "";
    if (!input || gameOver) return;

    idols.filter(i => 
        i.name.toLowerCase().includes(input) || 
        i.group.toLowerCase().includes(input)
    ).slice(0, 10).forEach(i => {
        const div = document.createElement("div");
        div.innerText = `${i.name} (${i.group})`;
        div.onclick = () => {
            document.getElementById("guessInput").value = div.innerText;
            guess();
        };
        sugBox.appendChild(div);
    });
}

function findIdol(input) {
    const match = input.match(/^(.*?)\s*\((.*?)\)$/);
    if (match) {
        return idols.find(i => i.name === match[1].trim() && i.group === match[2].trim());
    }
}

function compare(val, ans) {
    if (val === ans) return {cls:"correct"};
    if (Math.abs(val - ans) === 1) return {cls:"close"};
    return {cls:"wrong"};
}

function addRow(idol) {
    const row = document.getElementById("gameBody").insertRow();

    let cell = row.insertCell();
    cell.textContent = idol.name;
    cell.className = (idol.name === answer.name) ? "correct" : "wrong";

    cell = row.insertCell();
    cell.textContent = idol.group;
    cell.className = (idol.group === answer.group) ? "correct" : "wrong";

    cell = row.insertCell();
    cell.textContent = idol.nationality;

    const b = compare(idol.birth, answer.birth);
    cell = row.insertCell(); cell.textContent = idol.birth; cell.className = b.cls;

    const d = compare(idol.debut, answer.debut);
    cell = row.insertCell(); cell.textContent = idol.debut; cell.className = d.cls;

    const m = compare(idol.members, answer.members);
    cell = row.insertCell(); cell.textContent = idol.members; cell.className = m.cls;
}

function updateRemaining() {
    document.getElementById("remaining").textContent = `剩餘猜測次數：${currentMax - guessCount}`;
}

function guess() {
    if (gameOver) return;
    const idol = findIdol(document.getElementById("guessInput").value);
    if (!idol) return alert("找不到");

    guessCount++;
    addRow(idol);
    updateRemaining();
}

// ===== ⭐ 題庫功能 =====
let sortKey="", sortAsc=true;

function showDatabase(){
    document.getElementById("databaseModal").style.display="flex";
    document.getElementById("totalCount").innerText=idols.length;
    renderDatabase();
}

function closeDatabase(){
    document.getElementById("databaseModal").style.display="none";
}

function sortDB(key){
    if(sortKey===key) sortAsc=!sortAsc;
    else { sortKey=key; sortAsc=true; }
    renderDatabase();
}

function renderDatabase(){
    const body=document.getElementById("dbBody");
    body.innerHTML="";

    let data=[...idols];

    const g=document.getElementById("fGroup").value.toLowerCase();
    const n=document.getElementById("fNat").value.toLowerCase();
    const b=document.getElementById("fBirth").value;
    const d=document.getElementById("fDebut").value;
    const m=document.getElementById("fMembers").value;

    data=data.filter(i=>
        (!g||i.group.toLowerCase().includes(g)) &&
        (!n||i.nationality.toLowerCase().includes(n)) &&
        (!b||i.birth==b) &&
        (!d||i.debut==d) &&
        (!m||i.members==m)
    );

    if(sortKey){
        data.sort((a,b)=>{
            if(a[sortKey]<b[sortKey]) return sortAsc?-1:1;
            if(a[sortKey]>b[sortKey]) return sortAsc?1:-1;
            return 0;
        });
    }

    data.forEach(i=>{
        const r=body.insertRow();
        r.insertCell().textContent=i.name;
        r.insertCell().textContent=i.group;
        r.insertCell().textContent=i.nationality;
        r.insertCell().textContent=i.birth;
        r.insertCell().textContent=i.debut;
        r.insertCell().textContent=i.members;
    });
}

document.getElementById("guessInput").addEventListener("keypress", e => {
    if (e.key === "Enter") guess();
});

startNewGame(10);

</script>
