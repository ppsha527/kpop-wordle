<style>
body { font-family: Arial; background:#121213; color:white; text-align:center; margin:0; padding:0;}
input { padding:12px; font-size:18px; border-radius:8px; border:none; margin:5px; width:320px; }

#suggestions { 
    max-height:220px; overflow-y:auto; margin:8px auto; 
    text-align:left; width:340px; background:#1f1f21; 
    border-radius:8px; border:1px solid #333;
}
#suggestions div { 
    padding:10px 14px; cursor:pointer; border-bottom:1px solid #333;
}
#suggestions div:hover { background:#333; }

.correct { background:#6aaa64; }
.close { background:#c9b458; }
.wrong { background:#3a3a3c; }

table { margin:20px auto; border-collapse:collapse; }
td, th { border:1px solid #444; padding:10px 12px; }

#remaining { font-size:18px; margin:10px; color:#bbb; }
button { padding:10px 16px; margin:5px; font-size:16px; border-radius:8px; border:none; cursor:pointer; }

#dbBtn {
    position: fixed; top: 15px; right: 15px;
    background: #444; color: white; padding: 8px 14px;
    font-size: 14px; border-radius: 6px; z-index: 100;

#databaseModal {

#modalContent {

.group-title {

#idolList div {

</style>

// 遊戲變數
let answer = {};
let gameOver = false;
let guessCount = 0;
let currentMax = 10;

// ==================== 開始新遊戲 ====================
function startNewGame(maxGuesses) {
    currentMax = maxGuesses;
    answer = idols[Math.floor(Math.random() * idols.length)];
    gameOver = false;
    guessCount = 0;

    document.getElementById("gameBody").innerHTML = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("guessInput").value = "";
    document.getElementById("suggestions").innerHTML = "";
    updateRemaining();

    console.log("新答案：", answer.name, "(", answer.group, ")");
}

// ==================== 顯示推薦 ====================
function showSuggestions() {
    const input = document.getElementById("guessInput").value.toLowerCase().trim();
    const sugBox = document.getElementById("suggestions");
    sugBox.innerHTML = "";

    if (!input || gameOver) return;

    const matches = idols.filter(i => 
        i.name.toLowerCase().includes(input) || 
        i.group.toLowerCase().includes(input)
    ).slice(0, 10);

    matches.forEach(i => {
        const div = document.createElement("div");
        div.innerText = `${i.name} (${i.group})`;
        div.onclick = () => {
            document.getElementById("guessInput").value = `${i.name} (${i.group})`;
            sugBox.innerHTML = "";
            guess();
        };
        sugBox.appendChild(div);
    });
}

// ==================== 找偶像 ====================
function findIdol(input) {
    input = input.trim();
    const match = input.match(/^(.*?)\s*\((.*?)\)$/);
    if (match) {
        const name = match[1].trim().toLowerCase();
        const group = match[2].trim().toLowerCase();
        return idols.find(i => i.name.toLowerCase() === name && i.group.toLowerCase() === group);
    }
    return idols.find(i => i.name.toLowerCase() === input.toLowerCase());
}

// ==================== 數字比對 ====================
function compare(val, ans) {
    if (val === ans) return {cls:"correct"};
    if (Math.abs(val - ans) === 1) return {cls:"close"};
    return {cls:"wrong"};
}

// ==================== 新增一行 ====================
function addRow(idol) {
    const tbody = document.getElementById("gameBody");
    const row = tbody.insertRow();

    let cell = row.insertCell();
    cell.textContent = idol.name;
    cell.className = (idol.name === answer.name) ? "correct" : "wrong";

    cell = row.insertCell();
    cell.textContent = idol.group;
    cell.className = (idol.group === answer.group) ? "correct" : "wrong";

    const idolNats = idol.nationality.toLowerCase().split(/[\/,]/).map(s => s.trim());
    const ansNats = answer.nationality.toLowerCase().split(/[\/,]/).map(s => s.trim());
    let natClass = "wrong";
    if (idolNats.length === ansNats.length && idolNats.every(n => ansNats.includes(n))) natClass = "correct";
    else if (idolNats.some(n => ansNats.includes(n))) natClass = "close";

    cell = row.insertCell();
    cell.textContent = idol.nationality;
    cell.className = natClass;

    const b = compare(idol.birth, answer.birth);
    cell = row.insertCell(); cell.textContent = idol.birth; cell.className = b.cls;

    const d = compare(idol.debut, answer.debut);
    cell = row.insertCell(); cell.textContent = idol.debut; cell.className = d.cls;

    const m = compare(idol.members, answer.members);
    cell = row.insertCell(); cell.textContent = idol.members; cell.className = m.cls;
}

// ==================== 更新剩餘次數 ====================
function updateRemaining() {
    document.getElementById("remaining").textContent = `剩餘猜測次數：${currentMax - guessCount}`;
}

// ==================== 猜測 ====================
function guess() {
    if (gameOver) return;
    const input = document.getElementById("guessInput").value.trim();
    if (!input) return;

    const idol = findIdol(input);
    if (!idol) { alert("找不到這個偶像！"); return; }

    const already = Array.from(document.querySelectorAll("#gameBody tr")).some(r =>
        r.cells[0].textContent === idol.name && r.cells[1].textContent === idol.group
    );
    if (already) { alert("已經猜過這個人了！"); return; }

    guessCount++;
    addRow(idol);
    updateRemaining();

    if (idol.name === answer.name && idol.group === answer.group) {
        document.getElementById("result").innerHTML = `🎉 恭喜猜對！答案就是 <b>${answer.name} (${answer.group})</b>`;
        gameOver = true;
        return;
    }

    if (guessCount >= currentMax) {
        document.getElementById("result").innerHTML = `😢 遊戲結束！正確答案是 <b>${answer.name} (${answer.group})</b>`;
        gameOver = true;
    }

    document.getElementById("guessInput").value = "";
    document.getElementById("suggestions").innerHTML = "";
}

// ==================== 題庫（依照團體分組 + 多團拆分）===================
function showDatabase() {
    const modal = document.getElementById("databaseModal");
    const list = document.getElementById("idolList");
    list.innerHTML = "";

    const groups = {};

    idols.forEach(i => {
        const groupList = i.group.split('/');   // 用 / 拆分多團

        groupList.forEach(g => {
            const cleanGroup = g.trim();
            if (!groups[cleanGroup]) groups[cleanGroup] = [];
            groups[cleanGroup].push(i);
        });
    });

    // 排序團體名稱
    Object.keys(groups).sort().forEach(groupName => {
        const members = groups[groupName];

        const title = document.createElement("div");
        title.className = "group-title";
        title.innerHTML = `<strong>${groupName}</strong> (${members.length} 人)`;
        list.appendChild(title);

        // 成員排序（可選）
        members.sort((a,b) => a.name.localeCompare(b.name)).forEach(member => {
            const div = document.createElement("div");
            div.innerText = `• ${member.name} (${member.nationality})`;
            list.appendChild(div);
        });
    });

    document.getElementById("totalCount").textContent = idols.length;
    modal.style.display = "flex";
}

function closeDatabase() {
    document.getElementById("databaseModal").style.display = "none";
}

function filterDatabase() {
    const keyword = document.getElementById("modalSearch").value.toLowerCase().trim();
    const list = document.getElementById("idolList");
    list.innerHTML = "";

    const filtered = idols.filter(i => 
        i.name.toLowerCase().includes(keyword) || 
        i.group.toLowerCase().includes(keyword)
    );

    filtered.forEach(i => {
        const div = document.createElement("div");
        div.innerText = `${i.name} (${i.group})`;
        list.appendChild(div);
    });
}

// Enter 鍵
document.getElementById("guessInput").addEventListener("keypress", e => {
    if (e.key === "Enter") guess();
});

// 預設開始
startNewGame(10);
</script>
