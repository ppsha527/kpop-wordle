<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KPOP Wordle</title>
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #0f0f11, #1a1a1f);
        color: white;
        text-align: center;
        margin: 0;
        padding: 15px;
        min-height: 100vh;
        box-sizing: border-box;
    }
    h1 { margin: 15px 0 10px; font-size: 2.2em; text-shadow: 0 0 15px rgba(255, 20, 147, 0.5); }

    #updateBtn, #dbBtn, #rulesBtn {
        position: fixed; padding: 10px 18px; border: none; border-radius: 8px;
        cursor: pointer; font-size: 15px; z-index: 100; transition: all 0.2s;
    }
    #updateBtn { top: 15px; left: 15px; background: #9b59b6; color: white; }
    #dbBtn { top: 15px; right: 15px; background: #333; color: white; }
    #rulesBtn { top: 65px; right: 15px; background: #4a90e2; color: white; }

    button:hover { transform: translateY(-2px); filter: brightness(1.15); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-area { margin: 20px auto; max-width: 420px; width: 100%; position: relative; }
    input {
        padding: 16px 20px; font-size: 18px; border-radius: 12px; border: none;
        width: 100%; background: #25252b; color: white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    input:focus { box-shadow: 0 0 0 3px rgba(255, 20, 147, 0.4); outline: none; }

    #gameSetup {
        margin: 20px auto; max-width: 640px; background: #1f1f25;
        padding: 30px 20px 25px; border-radius: 16px;
    }
    #gameSetup h3 { font-size: 1.9em; margin: 0 0 28px 0; text-align: center; }

    .setting-group { margin-bottom: 28px; }
    .setting-group label { display: block; font-size: 17px; margin-bottom: 10px; text-align: center; }

    .btn-group {
        display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    }
    .btn-group button {
        padding: 12px 20px; font-size: 16px; border-radius: 10px; border: none;
        background: #333; color: white; cursor: pointer; transition: all 0.2s;
        min-width: 115px;
    }
    .btn-group button.selected {
        background: #ffffff !important; color: #1a1a1f !important; font-weight: bold;
    }

    #timer { font-size: 24px; font-weight: bold; margin: 15px 0; }
    #result { font-size: 26px; font-weight: bold; min-height: 90px; margin: 20px 0; color: #ffeb3b; }

    .table-container { 
        overflow-x: auto; 
        margin: 15px auto 40px auto; 
        max-width: 1100px; 
        border-radius: 12px; 
        box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
    }
    table { border-collapse: collapse; background: #1a1a1f; width: 100%; min-width: 980px; table-layout: fixed; font-size: 15.5px; }
    th, td { padding: 13px 8px; border: none; }
    th { background: #25252b; font-size: 14.5px; border-bottom: 2px solid #444; }

    .count-col { width: 55px; text-align: center; font-weight: bold; }
    .name-col { width: 130px; } .group-col { width: 140px; } .debut-col { width: 85px; }
    .members-col { width: 80px; } .nationality-col { width: 110px; }
    .birthyear-col { width: 85px; } .birthmonth-col { width: 75px; }

    .correct { background: #6aaa64 !important; color: white; }
    .close { background: #c9b458 !important; color: black; }
    .wrong { background: #3a3a3c !important; }
    .timeout { background: #555 !important; color: #aaa; }

    #suggestions {
        position: absolute; left: 50%; transform: translateX(-50%);
        top: 100%; max-height: 260px; overflow-y: auto; margin: 4px 0 0 0;
        text-align: left; width: 100%; max-width: 420px;
        background: #1f1f25; border-radius: 12px; border: 1px solid #444;
        box-shadow: 0 6px 20px rgba(0,0,0,0.4); z-index: 10;
    }
    #suggestions div {
        padding: 14px 18px; cursor: pointer; border-bottom: 1px solid #333;
    }
    #suggestions div:hover { background: #333; }
</style>
</head>
<body>
    <h1>🎤 KPOP女團 Wordle</h1>
   
    <button id="updateBtn" onclick="showUpdateInfo()">04/21更新資訊</button>
    <button id="dbBtn" onclick="showDatabase()">題庫</button>
    <button id="rulesBtn" onclick="showRules()">遊戲規則</button>

    <div id="gameSetup">
        <h3>遊戲設定</h3>
       
        <div class="setting-group">
            <label>難度</label>
            <div class="btn-group">
                <button onclick="selectDifficulty(8)" id="diff8">簡單 (8次)</button>
                <button onclick="selectDifficulty(6)" id="diff6">中等 (6次)</button>
                <button onclick="selectDifficulty(4)" id="diff4">困難 (4次)</button>
            </div>
        </div>

        <div class="setting-group">
            <label>年份設定（可複選，影響猜題範圍）</label>
            <div class="btn-group">
                <button onclick="toggleYear(this)" data-year="2014-">2014以前</button>
                <button onclick="toggleYear(this)" data-year="2015-2019">2015~2019</button>
                <button onclick="toggleYear(this)" data-year="2020-2026">2020~2026</button>
            </div>
        </div>

        <div class="setting-group">
            <label>每次作答時間</label>
            <div class="btn-group">
                <button onclick="selectTime(0)" id="time0">不計時</button>
                <button onclick="selectTime(30)" id="time30">30 秒</button>
                <button onclick="selectTime(60)" id="time60">60 秒</button>
                <button onclick="selectTime(90)" id="time90">90 秒</button>
                <button onclick="selectTime(120)" id="time120">120 秒</button>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <button onclick="startGameWithSettings()" style="background:#e91e63; font-size:17px; padding:14px 36px;">
                ▶️ 開始遊戲
            </button>
            <button onclick="confirmNewGame()" style="background:#333; font-size:16px; padding:12px 28px; margin-left: 10px;">
                🔄 新遊戲
            </button>
        </div>
    </div>

    <div id="timer">本次回答剩餘時間：不計時</div>
 
    <div class="input-area">
        <input id="guessInput" placeholder="輸入偶像名字（請先按開始遊戲）"
               autocomplete="off" oninput="showSuggestions()" disabled>
        <div id="suggestions"></div>
    </div>
   
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="count-col">次數</th>
                    <th class="name-col">名字</th>
                    <th class="group-col">團體</th>
                    <th class="debut-col">出道年</th>
                    <th class="members-col">成員數</th>
                    <th class="nationality-col">國籍</th>
                    <th class="birthyear-col">出生年</th>
                    <th class="birthmonth-col">出生月</th>
                </tr>
            </thead>
            <tbody id="gameBody"></tbody>
        </table>
    </div>

    <h2 id="result"></h2>

    <!-- 題庫彈窗 -->
    <div id="databaseModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:200;">
        <div style="background:#1f1f21;width:90%;max-width:1200px;max-height:90vh;overflow:auto;border-radius:16px;padding:25px;position:relative;">
            <button onclick="closeDatabase()" style="position:absolute;top:15px;right:15px;background:#c44;padding:8px 16px;">✕</button>
            <h2>📋 完整題庫</h2>
            <div style="margin:20px 0; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
                <select id="mainFilter" onchange="updateSearchOptions()" style="padding:12px 16px;font-size:16px;">
                    <option value="all">全部</option>
                    <option value="group">團體</option>
                    <option value="nationality">國籍</option>
                    <option value="birthy">出生年</option>
                    <option value="birthm">出生月</option>
                    <option value="debut">出道年</option>
                    <option value="members">成員數</option>
                </select>
                <input list="searchList" id="searchInput" placeholder="輸入關鍵字" style="padding:12px 16px;font-size:16px;width:280px;">
                <button onclick="renderDatabase()" style="padding:12px 24px;">篩選</button>
            </div>
            <table style="width:100%;">
                <thead>
                    <tr>
                        <th>名字</th><th>團體</th><th>出道年</th><th>成員數</th>
                        <th>國籍</th><th>出生年</th><th>出生月</th>
                    </tr>
                </thead>
                <tbody id="dbBody"></tbody>
            </table>
        </div>
    </div>
    <datalist id="searchList"></datalist>

// 遊戲變數
let answer = {}, gameOver = false, guessCount = 0, currentMax = 6;
let guessedSet = new Set();
let timerInterval = null;
let timeLeft = 0;
let gameStarted = false;

let selectedDifficulty = null;
let selectedTime = null;
let selectedYears = new Set();

const guessInput = document.getElementById('guessInput');
const gameBody = document.getElementById('gameBody');
const result = document.getElementById('result');
const timerDisplay = document.getElementById('timer');

// ================== 年份過濾 ==================
function isInSelectedYears(debut) {
    if (selectedYears.size === 0) return true;
    
    for (let range of selectedYears) {
        if (range === "2020-2026" && debut >= 2020 && debut <= 2026) return true;
        if (range === "2015-2019" && debut >= 2015 && debut <= 2019) return true;
        if (range === "2014-") {
            // 自動使用資料庫中最小的出道年
            const minDebut = Math.min(...idols.map(i => i.debut));
            if (debut >= minDebut && debut <= 2014) return true;
        }
    }
    return false;
}

// ================== 按鈕功能 ==================
function selectDifficulty(max) {
    selectedDifficulty = max;
    document.querySelectorAll('#gameSetup .btn-group button[id^="diff"]').forEach(b => b.classList.remove('selected'));
    document.getElementById(`diff${max}`).classList.add('selected');
}

function toggleYear(btn) {
    const range = btn.getAttribute('data-year');
    if (selectedYears.has(range)) {
        selectedYears.delete(range);
        btn.classList.remove('selected');
    } else {
        selectedYears.add(range);
        btn.classList.add('selected');
    }
}

function selectTime(seconds) {
    selectedTime = seconds;
    document.querySelectorAll('#gameSetup .btn-group button[id^="time"]').forEach(b => b.classList.remove('selected'));
    document.getElementById(`time${seconds}`).classList.add('selected');
}

// ================== 遊戲控制 ==================
function startGameWithSettings() {
    if (!selectedDifficulty) return alert("請選擇難度！");
    if (selectedYears.size === 0) return alert("請至少選擇一個年份範圍！");
    if (selectedTime === null) return alert("請選擇作答時間！");

    startNewGame(selectedDifficulty, selectedTime);
}

function confirmNewGame() {
    if (gameStarted && !gameOver && guessCount > 0 && !confirm("確定要放棄目前遊戲，開始新的一局嗎？")) return;
    
    // 新遊戲：重置狀態，但允許重新調整設定
    gameOver = false;
    guessCount = 0;
    guessedSet.clear();
    gameStarted = false;
    result.innerHTML = "";
    guessInput.value = "";
    guessInput.disabled = true;

    if (timerInterval) clearInterval(timerInterval);
    updateTimerDisplay(selectedTime || 0);

    initTableRows();
    disableGameSettings(false);   // 允許重新調整設定
}

function startNewGame(max, timeLimit) {
    let filteredIdols = idols.filter(idol => isInSelectedYears(idol.debut));
    
    if (filteredIdols.length === 0) {
        return alert("目前年份設定沒有符合的藝人，請調整年份範圍！");
    }

    currentMax = max;
    answer = filteredIdols[Math.floor(Math.random() * filteredIdols.length)];
    
    gameOver = false;
    guessCount = 0;
    guessedSet.clear();
    gameStarted = true;
    result.innerHTML = "";
    guessInput.value = "";
    guessInput.disabled = false;

    initTableRows();
    updateTimerDisplay(timeLimit);

    if (timerInterval) clearInterval(timerInterval);
    timeLeft = timeLimit;

    // 開始遊戲才啟動計時器
    if (timeLimit > 0) {
        startTimer(timeLimit);
    }

    disableGameSettings(true);   // 鎖定設定
}

function initTableRows() {
    gameBody.innerHTML = "";
    for (let i = 1; i <= currentMax; i++) {
        let row = gameBody.insertRow();
        let cell = row.insertCell();
        cell.textContent = i;
        cell.classList.add('count-col');
        for (let j = 0; j < 7; j++) row.insertCell();
    }
}

function updateTimerDisplay(seconds) {
    timerDisplay.textContent = seconds > 0 
        ? `本次回答剩餘時間：${seconds} 秒` 
        : `本次回答剩餘時間：不計時`;
}

function startTimer(seconds) {
    timeLeft = seconds;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `本次回答剩餘時間：${timeLeft} 秒`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (!gameOver) skipCurrentGuess();
        }
    }, 1000);
}

function skipCurrentGuess() {
    if (guessCount >= currentMax) return;
    guessCount++;
    markRowAsTimeout(guessCount);
    if (guessCount >= currentMax) {
        gameOver = true;
        showFinalAnswer();
        disableInput();
        return;
    }
    if (selectedTime > 0) startTimer(selectedTime);
}

function markRowAsTimeout(rowNum) {
    const rows = gameBody.rows;
    if (rowNum > 0 && rowNum <= rows.length) {
        const row = rows[rowNum - 1];
        row.cells[1].textContent = "已超時";
        row.cells[1].colSpan = 7;
        row.cells[1].classList.add('timeout');
        for (let i = row.cells.length - 1; i >= 2; i--) row.deleteCell(i);
    }
}

function disableInput() {
    guessInput.disabled = true;
}

function showFinalAnswer() {
    result.innerHTML = `正確答案是 <b>${answer.name} (${answer.group})</b>`;
    disableGameSettings(false);   // 遊戲結束後恢復設定
}

// ================== 猜測功能 ==================
function showSuggestions() {
    let input = guessInput.value.toLowerCase().trim();
    const suggestions = document.getElementById('suggestions');
    suggestions.innerHTML = "";
    if (!input || gameOver || !gameStarted) return;

    let filtered = idols.filter(i =>
        !guessedSet.has(i.name + i.group) &&
        (i.name.toLowerCase().includes(input) || i.group.toLowerCase().includes(input))
    ).slice(0, 8);

    filtered.forEach(i => {
        let d = document.createElement("div");
        d.textContent = `${i.name} (${i.group})`;
        d.onclick = () => {
            guessInput.value = `${i.name} (${i.group})`;
            suggestions.innerHTML = "";
            guess();
        };
        suggestions.appendChild(d);
    });
}

function guess() {
    if (!gameStarted || gameOver || guessCount >= currentMax) return;
    const input = guessInput.value.trim();
    if (!input) return;

    const idol = idols.find(i => `${i.name} (${i.group})`.toLowerCase() === input.toLowerCase());
    if (!idol) {
        alert("找不到這個偶像！");
        return;
    }

    if (!isInSelectedYears(idol.debut)) {
        alert("此偶像不在目前選擇的年份範圍內！");
        guessInput.value = "";
        return;
    }

    let key = idol.name + idol.group;
    if (guessedSet.has(key)) return;

    guessedSet.add(key);
    guessCount++;

    if (timerInterval) clearInterval(timerInterval);
    fillRow(guessCount, idol);

    if (idol.name === answer.name && idol.group === answer.group) {
        gameOver = true;
        showFinalAnswer();
        disableInput();
        return;
    }

    if (guessCount >= currentMax) {
        gameOver = true;
        showFinalAnswer();
        disableInput();
        return;
    }

    guessInput.value = "";
    if (selectedTime > 0) startTimer(selectedTime);
}

function fillRow(rowNum, idol) {
    const rows = gameBody.rows;
    if (rowNum < 1 || rowNum > rows.length) return;
    
    const row = rows[rowNum - 1];
    row.cells[1].textContent = idol.name;
    row.cells[1].classList.add(idol.name === answer.name ? 'correct' : 'wrong');
    row.cells[2].textContent = idol.group;
    row.cells[2].classList.add(idol.group === answer.group ? 'correct' : 'wrong');
    row.cells[3].textContent = idol.debut;
    row.cells[3].classList.add(getCloseClass(idol.debut, answer.debut));
    row.cells[4].textContent = idol.members;
    row.cells[4].classList.add(getCloseClass(idol.members, answer.members));
    row.cells[5].textContent = idol.nationality;
    row.cells[5].classList.add(getNationalityClass(idol.nationality, answer.nationality));
    row.cells[6].textContent = idol.birthy;
    row.cells[6].classList.add(getCloseClass(idol.birthy, answer.birthy));
    row.cells[7].textContent = idol.birthm;
    row.cells[7].classList.add(getCloseClass(idol.birthm, answer.birthm));
}

function getCloseClass(guessed, correct) {
    if (guessed === correct) return 'correct';

    // 出生月特別處理：支援循環（1月與12月視為接近）
    if (typeof guessed === 'number' && typeof correct === 'number') {
        const diff = Math.abs(guessed - correct);
        
        // 一般情況 ±1
        if (diff === 1) return 'close';
        
        // 特殊情況：1月和12月互相接近
        if ((guessed === 1 && correct === 12) || (guessed === 12 && correct === 1)) {
            return 'close';
        }
    }

    return 'wrong';
}

function getNationalityClass(guessed, correct) {
    if (guessed === correct) return 'correct';
    const g = guessed.split('/').map(s => s.trim());
    const c = correct.split('/').map(s => s.trim());
    return g.some(gg => c.includes(gg)) || c.some(cc => g.includes(cc)) ? 'close' : 'wrong';
}

function showDatabase() {
    document.getElementById('databaseModal').style.display = "flex";
    updateSearchOptions();
    renderDatabase();
}

function closeDatabase() {
    document.getElementById('databaseModal').style.display = "none";
}

function updateSearchOptions() {
    const type = document.getElementById('mainFilter').value;
    const datalist = document.getElementById('searchList');
    datalist.innerHTML = "";

    if (type === "all") {
        // 全部時顯示所有名字，並按 A~Z 排序
        const names = [...new Set(idols.map(i => i.name))].sort((a, b) => a.localeCompare(b));
        names.forEach(name => {
            let opt = document.createElement("option");
            opt.value = name;
            datalist.appendChild(opt);
        });
    } else {
        let values = [...new Set(idols.map(i => i[type]))];
        if (["birthy", "birthm", "debut", "members"].includes(type)) {
            values.sort((a, b) => Number(a) - Number(b));
        } else {
            values.sort((a, b) => String(a).localeCompare(String(b)));
        }
        values.forEach(v => {
            let opt = document.createElement("option");
            opt.value = v;
            datalist.appendChild(opt);
        });
    }
}

function renderDatabase() {
    const tbody = document.getElementById('dbBody');
    tbody.innerHTML = "";

    const type = document.getElementById('mainFilter').value;
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

    let filtered = idols;

    // 關鍵字篩選
    if (keyword) {
        if (type === "all") {
            filtered = idols.filter(i => 
                i.name.toLowerCase().includes(keyword) || 
                i.group.toLowerCase().includes(keyword)
            );
        } else {
            filtered = idols.filter(i => String(i[type]).toLowerCase().includes(keyword));
        }
    }

    // === 重點：統一排序邏輯 ===
    filtered.sort((a, b) => {
        // 1. 出道年排序
        if (a.debut !== b.debut) return a.debut - b.debut;
        
        // 2. 出生年排序
        if (a.birthy !== b.birthy) return a.birthy - b.birthy;
        
        // 3. 出生月排序
        if (a.birthm !== b.birthm) return a.birthm - b.birthm;
        
        // 4. 名字 A~Z 排序
        return a.name.localeCompare(b.name);
    });

    filtered.forEach(i => {
        let r = tbody.insertRow();
        r.insertCell().textContent = i.name;
        r.insertCell().textContent = i.group;
        r.insertCell().textContent = i.debut;
        r.insertCell().textContent = i.members;
        r.insertCell().textContent = i.nationality;
        r.insertCell().textContent = i.birthy;
        r.insertCell().textContent = i.birthm;
    });
}
